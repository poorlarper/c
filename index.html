<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fed | guns.lol</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            cursor: url(https://r2.guns.lol/0803aefc-b9d6-41bf-b034-abb18afa414e.webp) 16 16, auto !important;
        }

        body, html {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
        }

        /* Fullscreen Background Image */
        .bg-image {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6) blur(2px);
            z-index: 1;
        }

        /* Main Wrapper */
        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 700px;
        }

        /* Frosted Glass Container */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header Section */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar-main {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .header-text h1 {
            color: #fff;
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-text h1 span.icons {
            font-size: 18px;
            opacity: 0.6;
        }

        .header-text p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        /* Cards Row */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-info h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .card-info p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* Roblox Card Specifics */
        .roblox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .roblox-logo {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .roblox-card {
            flex-direction: column;
            align-items: flex-start;
        }

        .roblox-content {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .view-btn {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 10px;
            align-self: flex-start;
            transition: opacity 0.2s;
        }

        .view-btn:hover {
            opacity: 0.9;
        }

        /* Footer Info */
        .footer-info {
            display: flex;
            align-items: center;
            gap: 5px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* Music Player Bar */
        .music-player {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #fff;
        }

        .track-info i {
            font-size: 20px;
            opacity: 0.6;
        }

        .track-name {
            font-weight: 700;
            font-size: 14px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            width: 50%;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            width: 90%; /* Mocked percentage */
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #fff;
        }

        .controls i {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .controls i:hover {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .cards-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="wrapper">
        
        <div class="container">
            
            <div class="header-section">
                <div class="avatar-main"></div>
                <div class="header-text">
                    <h1>fed <span class="icons"><i class="fa-solid fa-gauge-high"></i> <i class="fa-solid fa-fire"></i> <i class="fa-solid fa-gem"></i></span></h1>
                    <p>Joined over 1 year ago</p>
                </div>
            </div>

            <div class="cards-row">
                
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=100&h=100&fit=crop" class="card-img" alt="Avatar">
                    <div class="card-info">
                        <h3>6ljy</h3>
                        <p>last seen unknown</p>
                    </div>
                </div>

                <div class="card roblox-card">
                    <div class="roblox-header">
                        <span class="roblox-logo"><i class="fa-solid fa-square"></i> Roblox</span>
                    </div>
                    <div class="roblox-content">
                        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=100&h=100&fit=crop" class="card-img" alt="Avatar">
                        <div class="card-info">
                            <h3>fed</h3>
                            <p>4 Friends · 10,996 Followers</p>
                        </div>
                    </div>
                    <a href="#" class="view-btn">View Profile</a>
                </div>

            </div>

            <div class="footer-info">
                <i class="fa-regular fa-eye"></i> 305
            </div>

        </div>

        <div class="music-player">
            <div class="track-info">
                <i class="fa-solid fa-music"></i>
                <div class="track-name">Let Go</div>
            </div>

            <div class="progress-container">
                <span>3:42</span>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <span>4:08</span>
            </div>

            <div class="controls">
                <i class="fa-solid fa-backward-step"></i>
                <i class="fa-solid fa-pause"></i>
                <i class="fa-solid fa-forward-step"></i>
            </div>
        </div>

    </div>

</body>
</html>
