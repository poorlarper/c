<!DOCTYPE html>
<html class="notranslate ltr en" dir="ltr" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>ZeX | alos.gg</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/1c6572e8bfeeb4a6.css">
    <link rel="stylesheet" href="css/4bcb1e88bc1a9df5.css">
    <link rel="stylesheet" href="css/63408633f2b71c8c.css">
    <link rel="stylesheet" href="css/8ac3306ad4a9fd92.css">
    <link rel="stylesheet" href="css/a75a360d5e4ba66c.css">
    <link rel="stylesheet" href="css/cb6ff2fc04d0071e.css">
    <link rel="stylesheet" href="css/X6XYTKIVDUW7GZTZPZNN4EUM5KH54KHF.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* This ensures the cursor from your screenshot is used */
        * { cursor: url(https://r2.guns.lol/0803aefc-b9d6-41bf-b034-abb18afa414e.webp) 16 16, auto !important; }
        
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #entry-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 1s ease; cursor: pointer; }
        .enter-text { color: #fff; text-transform: uppercase; letter-spacing: 0.6em; font-size: 12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); }

        .container { 
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
        }

        .profile-img { width: 100px; height: 100px; border-radius: 20%; margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.2); }
        .name { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .bio { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 8px; 
            transition: 0.3s;
            font-size: 14px;
        }
        .link:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="entry-overlay" onclick="startSite()">
        <div class="enter-text">[ click to enter ]</div>
    </div>

    <video loop muted playsinline id="bg-video">
        <source src="https://cdn.pixabay.com/video/2021/04/12/70918-537441113_tiny.mp4" type="video/mp4">
    </video>

    <div class="container">
        <img src="png/pfp.png" class="profile-img">
        <h1 class="name">ZeX</h1>
        <p class="bio">CODING SINCE 2016 - OWNER@ALOS</p>
        
        <div class="links">
            <a href="https://github.com/ddosnotification" class="link">GitHub</a>
            <a href="https://t.me/ddosnotification" class="link">Telegram</a>
            <a href="https://alos.gg" class="link">alos.gg</a>
        </div>
    </div>

    <script>
        function startSite() {
            document.getElementById('entry-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('entry-overlay').style.display = 'none'; }, 1000);
            document.getElementById('bg-video').play();
        }
    </script>

</body>
</html>
